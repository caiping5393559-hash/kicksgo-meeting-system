<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kicksgo 周会管理系统</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="authView" class="auth-shell">
      <section class="auth-panel">
        <div class="brand-row">
          <div>
            <h1>Kicksgo 周会管理系统</h1>
            <p>周报填写、会议链接、腾讯会议文字记录和行动项归档</p>
          </div>
          <span class="status-chip">Internal</span>
        </div>
        <div class="auth-grid">
          <form id="loginForm" class="form-block">
            <h2>登录</h2>
            <label>用户名<input name="username" autocomplete="username" required /></label>
            <label>密码<input name="password" type="password" autocomplete="current-password" required /></label>
            <button type="submit">登录</button>
            <div class="hint">初始管理员：admin / Kicksgo-Admin-2026!</div>
            <div class="hint">你的普通账号：boss / Kicksgo-Boss-2026!</div>
          </form>
          <form id="registerForm" class="form-block secondary">
            <h2>注册账号</h2>
            <label>用户名<input name="username" autocomplete="username" required /></label>
            <label>系统显示名<input name="display_name" required placeholder="例如：凯尔 / Ken / 深圳财务-小王" /></label>
            <label>腾讯会议参会人名<textarea name="meeting_aliases" required placeholder="必须填写。多个名称用逗号或换行分隔，例如：Kyle, KYLE, 凯尔"></textarea></label>
            <label>现实姓名 / 称呼 / 外号<textarea name="mention_aliases" required placeholder="必须填写。多个称呼用逗号或换行分隔，例如：老陈, 陈总, Kyle, 凯尔"></textarea></label>
            <label>业务角色<select id="registerBusinessRoles" name="business_role_ids" class="multi-select" multiple size="8"><option disabled>正在加载业务角色...</option></select></label>
            <label>密码<input name="password" type="password" autocomplete="new-password" required /></label>
            <button type="submit">提交注册</button>
            <div class="hint">业务角色可以多选。注册后需要管理员审核，管理员可以继续修改名称匹配和业务角色。</div>
          </form>
        </div>
        <div id="authMessage" class="message"></div>
      </section>
    </div>

    <div id="appView" class="app-shell hidden">
      <aside class="sidebar">
        <div class="side-title">
          <strong>Kicksgo</strong>
          <span>Weekly OS</span>
        </div>
        <nav id="nav"></nav>
        <div class="side-footer">
          <div id="currentUserLabel"></div>
          <button id="logoutBtn" class="ghost-btn">退出登录</button>
        </div>
      </aside>
      <main class="main">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">周会首页</h1>
            <p id="pageSubtitle">每周会前收集，会中按流程发言，会后保存文字记录和行动项。</p>
          </div>
          <div id="storageLabel" class="storage-label"></div>
        </header>
        <div id="passwordNotice" class="password-notice hidden">
          <span>当前账号使用临时密码，请尽快修改。</span>
          <form id="changePasswordForm">
            <input name="current_password" type="password" placeholder="当前密码" required />
            <input name="new_password" type="password" placeholder="新密码" required />
            <button type="submit">修改密码</button>
          </form>
        </div>
        <section id="content" class="content"></section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
