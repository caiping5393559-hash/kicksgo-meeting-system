<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kicksgo 周会管理系统</title>
    <link rel="stylesheet" href="/styles.css?v=20260617-qa-polish" />
  </head>
  <body>
    <div id="authView" class="auth-shell">
      <section class="auth-panel">
        <div class="brand-row">
          <div>
            <h1>Kicksgo 周会管理系统</h1>
            <p>周报填写、会议链接、腾讯会议文字记录和行动项归档</p>
          </div>
          <span class="status-chip">Internal</span>
        </div>
        <div class="auth-grid">
          <form id="loginForm" class="form-block">
            <h2>登录</h2>
            <label>用户名<input name="username" autocomplete="username" required placeholder="可以用中文名，例如：凯尔、老陈、诺诺" /></label>
            <label>密码<input name="password" type="password" autocomplete="current-password" required /></label>
            <button type="submit">登录</button>
          </form>
          <div id="registerGate" class="form-block secondary">
            <h2>注册账号</h2>
            <p class="hint">没有账号时，先点击注册，再填写用户名、腾讯会议名和业务角色。提交后会直接进入系统。</p>
            <button type="button" id="showRegisterBtn" class="plain-btn">注册账号</button>
          </div>
          <form id="registerForm" class="form-block secondary hidden">
            <h2>注册账号</h2>
            <label>用户名<input name="username" autocomplete="username" required placeholder="可以用中文名，例如：凯尔、老陈、诺诺" /></label>
            <label>系统显示名<input name="display_name" required placeholder="例如：凯尔 / Ken / 深圳财务-小王" /></label>
            <label>腾讯会议参会人名<textarea name="meeting_aliases" required placeholder="必须填写。多个名称用逗号或换行分隔，例如：Kyle, KYLE, 凯尔"></textarea></label>
            <div class="alias-label">
              <span>现实姓名 / 称呼 / 外号</span>
              <div class="alias-editor" data-alias-name="mention_aliases">
                <input type="hidden" name="mention_aliases" />
                <div class="alias-list"></div>
                <div class="alias-entry-row">
                  <input class="alias-input" placeholder="输入一个称呼，例如：陈总" />
                  <button type="button" class="plain-btn alias-add">新增</button>
                </div>
              </div>
            </div>
            <div class="alias-label">
              <span>业务角色</span>
              <div id="registerBusinessRoles" class="checkbox-grid role-checkboxes"><span class="muted">正在加载业务角色...</span></div>
            </div>
            <label>密码<input name="password" type="password" autocomplete="new-password" required /></label>
            <button type="submit">提交注册</button>
            <button type="button" id="hideRegisterBtn" class="plain-btn">取消注册</button>
            <div class="hint">用户名建议直接用自己的中文名或平时称呼；业务角色按实际负责内容选择，可以多选。不确定就选最接近的，提交后本人不能更改，只能由管理员后台调整。</div>
          </form>
        </div>
        <div id="authMessage" class="message"></div>
      </section>
    </div>

    <div id="appView" class="app-shell hidden">
      <aside class="sidebar">
        <div class="side-title">
          <strong>Kicksgo</strong>
          <span>Weekly OS</span>
        </div>
        <nav id="nav"></nav>
        <div class="side-footer">
          <div id="currentUserLabel"></div>
          <button id="logoutBtn" class="ghost-btn">退出登录</button>
        </div>
      </aside>
      <main class="main">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">周会首页</h1>
            <p id="pageSubtitle">每周会前收集，会中按流程发言，会后保存文字记录和行动项。</p>
          </div>
          <div id="storageLabel" class="storage-label"></div>
        </header>
        <div id="passwordNotice" class="password-notice hidden">
          <span>注册成功或当前账号需要确认密码，请在这里修改。</span>
          <form id="changePasswordForm">
            <input name="current_password" type="password" placeholder="当前密码" required />
            <input name="new_password" type="password" placeholder="新密码" required />
            <button type="submit">修改密码</button>
          </form>
        </div>
        <section id="content" class="content"></section>
      </main>
    </div>

    <script src="/app.js?v=20260617-qa-polish"></script>
  </body>
</html>
